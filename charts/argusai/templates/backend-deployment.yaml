apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argusai.backendFullname" . }}
  labels:
    {{- include "argusai.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "argusai.backendSelectorLabels" . | nindent 6 }}
  # Recreate: single-replica stateful backend on a ReadWriteOnce PVC. A surge
  # pod cannot mount the RWO volume elsewhere -> rolling deadlock. See
  # PRODUCTION_DEPLOYMENT.md for the web/worker split that removes this.
  strategy:
    {{- toYaml .Values.backend.strategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "argusai.backendSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "argusai.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Keep >= the in-process drain (queue 30s + cameras 5s + buffer); keep in
      # sync with the lifespan shutdown timeouts in backend/main.py.
      terminationGracePeriodSeconds: {{ .Values.backend.terminationGracePeriodSeconds }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "argusai.configMapName" . }}
            - secretRef:
                name: {{ include "argusai.secretName" . }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
          # Gate liveness behind a startup probe so a slow cold boot (CLIP model
          # load, Protect WS, HomeKit bridge) is not mistaken for a crash.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: {{ .Values.backend.startupProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "argusai.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
