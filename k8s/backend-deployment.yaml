# ArgusAI Backend Deployment
# Deploys the FastAPI backend with AI processing capabilities
# Requires: ConfigMap (argusai-config), Secret (argusai-secrets), PVC (argusai-data)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argusai-backend
  namespace: argusai
  labels:
    app: argusai
    component: backend
    app.kubernetes.io/name: argusai
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argusai
      component: backend
  # Recreate (not RollingUpdate): the backend is a single-replica stateful
  # singleton (in-process queue, per-camera threads, APScheduler, HomeKit/
  # Protect/MQTT clients) bound to a ReadWriteOnce PVC. A surge pod cannot
  # mount the RWO volume on another node -> rolling deadlock. Recreate stops
  # the old pod before starting the new one. (Brief downtime is acceptable;
  # see PRODUCTION_DEPLOYMENT.md for the web/worker split that removes it.)
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: argusai
        component: backend
        app.kubernetes.io/name: argusai
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # Must exceed the in-process drain: event-queue drain (30s) + camera
      # stop (5s) + buffer. Keep in sync with the lifespan shutdown timeouts
      # in backend/main.py so SIGKILL never truncates the queue drain.
      terminationGracePeriodSeconds: 45
      containers:
        - name: backend
          image: ghcr.io/project-argusai/argusai-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: argusai-config
            - secretRef:
                name: argusai-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: data
              mountPath: /app/data
          # Startup probe: a cold backend loads the CLIP model and opens the
          # Protect WebSocket / HomeKit bridge, which can take well over the
          # liveness initialDelay. Gate liveness behind startup so a slow boot
          # is not mistaken for a crash. Allows up to 30 x 5s = 150s to start.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: argusai-data
